<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประวัติการตรวจ - HygieGo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; }
        #sidebar-overlay { display: none; }
        #sidebar-overlay.active { display: block; background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(4px); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen lg:flex">

    <div class="lg:hidden bg-[#0f172a] text-white p-5 flex justify-between items-center sticky top-0 z-[60]">
        <div class="flex items-center gap-3">
            <i class="fas fa-shield-alt text-[#00C3AA] text-2xl"></i>
            <span class="font-bold text-xl">HygieGo</span>
        </div>
        <button id="mobile-toggle" class="p-2.5 hover:bg-white/10 rounded-lg">
            <i class="fas fa-bars text-2xl"></i>
        </button>
    </div>

    <div id="sidebar-overlay" class="fixed inset-0 z-40 lg:hidden transition-opacity"></div>

    <aside id="main-sidebar" class="fixed inset-y-0 left-0 w-72 bg-[#0f172a] text-white flex flex-col z-50 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out">
        <div class="p-8">
            <a class="flex items-center gap-3 mb-12" href="../index.html">
                <div class="w-12 h-12 bg-[#00c3aa] rounded-2xl flex items-center justify-center shadow-lg shadow-[#00c3aa]/20">
                    <i class="fa-solid fa-shield-virus text-2xl text-white"></i>
                </div>
                <h1 class="text-3xl font-bold tracking-tight">Hygie<span class="text-[#00c3aa]">Go</span></h1>
            </a>

            <div class="p-5 bg-slate-800/50 rounded-[1.5rem] border border-slate-700/50 mb-10">
                <div class="flex items-center gap-4">
                    <div id="userInitials" class="w-12 h-12 rounded-full bg-gradient-to-tr from-[#00c3aa] to-blue-500 flex items-center justify-center font-bold text-white uppercase text-base">?</div>
                    <div class="overflow-hidden">
                        <p id="sideUserName" class="text-base font-semibold truncate">Loading...</p>
                        <p id="userRole" class="text-xs text-[#00c3aa] font-black uppercase tracking-widest mt-0.5">Premium Member</p>
                    </div>
                </div>
            </div>

            <nav class="space-y-3">
                <a href="customer-dashboard.html" class="flex items-center gap-4 px-5 py-4 rounded-2xl text-slate-400 hover:bg-slate-800 hover:text-white transition-all text-base font-medium">
                    <i class="fa-solid fa-grip-vertical w-6"></i> ภาพรวมระบบ
                </a>
                <a href="#" class="flex items-center gap-4 px-5 py-4 rounded-2xl bg-[#00c3aa] text-[#0f172a] font-black shadow-lg shadow-[#00c3aa]/20 transition-all text-base">
                    <i class="fa-solid fa-clipboard-check w-6"></i> ประวัติการตรวจ
                </a>
            </nav>
        </div>

        <div class="mt-auto p-8 border-t border-slate-800">
            <button id="btnLogout" class="w-full py-4 rounded-2xl bg-red-500/10 text-red-400 hover:bg-red-500 hover:text-white transition-all flex items-center justify-center gap-3 text-base font-black">
                <i class="fa-solid fa-power-off"></i> ออกจากระบบ
            </button>
        </div>
    </aside>

    <main class="flex-1 lg:ml-72 p-8 lg:p-12">
        <header class="mb-12">
            <h1 class="text-3xl lg:text-4xl font-black text-slate-800">ประวัติการตรวจย้อนหลัง</h1>
            <p class="text-slate-500 text-lg mt-2 font-medium">ตรวจสอบคะแนนและผลการประเมินมาตรฐานของคุณทั้งหมด</p>
        </header>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-8 mb-12">
            <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 group hover:border-[#00c3aa] transition-all">
                <p class="text-slate-400 text-xs font-black uppercase tracking-widest mb-3">ตรวจไปแล้ว</p>
                <div class="flex items-baseline gap-3">
                    <h2 id="totalInspections" class="text-4xl font-black text-slate-800">0</h2>
                    <span class="text-slate-400 text-sm font-bold">ครั้ง</span>
                </div>
            </div>
            <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-[#00c3aa]/20 group hover:border-[#00c3aa] transition-all">
                <p class="text-slate-400 text-xs font-black uppercase tracking-widest mb-3">คะแนนเฉลี่ย</p>
                <h2 id="avgScore" class="text-4xl font-black text-[#00c3aa]">0</h2>
            </div>
            <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 group hover:border-[#00c3aa] transition-all">
                <p class="text-slate-400 text-xs font-black uppercase tracking-widest mb-3">สถานะล่าสุด</p>
                <h2 id="latestResult" class="text-2xl font-black text-blue-500">-</h2>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden hidden md:block">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b border-slate-100">
                    <tr class="text-xs font-black uppercase tracking-widest text-slate-400">
                        <th class="px-10 py-6">วันที่ตรวจ</th>
                        <th class="px-10 py-6">คะแนนเต็ม (100)</th>
                        <th class="px-10 py-6">ผลการประเมิน</th>
                        <th class="px-10 py-6 text-right">รายละเอียด</th>
                    </tr>
                </thead>
                <tbody id="historyTableBody" class="divide-y divide-slate-50">
                    </tbody>
            </table>
        </div>

        <div id="mobileHistoryList" class="space-y-6 md:hidden">
            </div>
    </main>

    <script type="module">
        const SUPABASE_URL = 'https://yqlbdwfcnffjuzjznrbi.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_JFvzaU8LuSa8KzL7o7Fmaw_J4oergY7';
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const savedUser = JSON.parse(localStorage.getItem('hygieUser'));
        const mobileToggle = document.getElementById('mobile-toggle');
        const sidebar = document.getElementById('main-sidebar');
        const overlay = document.getElementById('sidebar-overlay');

        function toggleSidebar() {
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('active');
        }

        mobileToggle.addEventListener('click', toggleSidebar);
        overlay.addEventListener('click', toggleSidebar);

        async function init() {
            if (!savedUser) { window.location.href = '../auth/login.html'; return; }
            document.getElementById('userInitials').innerText = savedUser.first_name.charAt(0);
            document.getElementById('sideUserName').innerText = savedUser.first_name;
            loadHistory();
        }

        async function loadHistory() {
            const { data, error } = await client
                .from('booking')
                .select('*, inspection(*)')
                .eq('user_id', savedUser.user_id)
                .order('created_at', { ascending: false });

            if (error) return;

            const tbody = document.getElementById('historyTableBody');
            const mobileList = document.getElementById('mobileHistoryList');
            tbody.innerHTML = ''; mobileList.innerHTML = '';
            
            let total = 0; let count = 0;

            data.forEach(item => {
                const insp = item.inspection[0];
                const score = insp?.total_score || 0;
                const result = insp?.result || 'Pending';
                if (insp) { total += score; count++; }

                const badgeClass = result === 'Pass' 
                    ? 'bg-emerald-100 text-emerald-600 border-emerald-200' 
                    : result === 'Pending' ? 'bg-orange-100 text-orange-600 border-orange-200' : 'bg-red-100 text-red-600 border-red-200';

                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50/50 transition-all group">
                        <td class="px-10 py-7 text-base font-bold text-slate-600">${item.booking_date}</td>
                        <td class="px-10 py-7">
                            <span class="text-2xl font-black text-slate-800">${score}</span>
                            <span class="text-slate-400 text-sm font-bold ml-1">/ 100</span>
                        </td>
                        <td class="px-10 py-7">
                            <span class="px-4 py-1.5 rounded-xl text-xs font-black uppercase border ${badgeClass}">
                                ${result}
                            </span>
                        </td>
                        <td class="px-10 py-7 text-right">
                            <button onclick="location.href='customer-report.html?id=${item.booking_id}'" class="p-3 text-slate-400 hover:text-[#00c3aa] transition-colors text-lg">
                                <i class="fa-solid fa-chevron-right"></i>
                            </button>
                        </td>
                    </tr>`;

                mobileList.innerHTML += `
                    <div class="bg-white p-7 rounded-[2rem] border border-slate-100 shadow-sm">
                        <div class="flex justify-between items-start mb-5">
                            <div>
                                <p class="text-xs font-black text-slate-400 uppercase tracking-widest mb-1">วันที่ตรวจ</p>
                                <p class="text-base font-bold text-slate-700">${item.booking_date}</p>
                            </div>
                            <span class="px-4 py-1.5 rounded-xl text-[11px] font-black uppercase border ${badgeClass}">
                                ${result}
                            </span>
                        </div>
                        <div class="flex justify-between items-end">
                            <div>
                                <p class="text-xs font-black text-slate-400 uppercase tracking-widest mb-1">คะแนนที่ได้</p>
                                <p class="text-3xl font-black text-slate-800">${score} <span class="text-sm text-slate-400">/ 100</span></p>
                            </div>
                            <button onclick="location.href='customer-report.html?id=${item.booking_id}'" class="text-sm font-black text-[#00c3aa] flex items-center gap-2 uppercase tracking-wider">
                                ดูรายงาน <i class="fa-solid fa-arrow-right"></i>
                            </button>
                        </div>
                    </div>`;
            });

            document.getElementById('totalInspections').innerText = data.length;
            document.getElementById('avgScore').innerText = count > 0 ? (total/count).toFixed(1) : '0';
            document.getElementById('latestResult').innerText = data[0]?.inspection[0]?.result || 'รอคิวตรวจ';
        }

        document.getElementById('btnLogout').addEventListener('click', () => { localStorage.clear(); window.location.href = '../auth/login.html'; });
        init();
    </script>
</body>
</html>

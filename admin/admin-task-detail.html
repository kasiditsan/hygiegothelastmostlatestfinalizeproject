<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายละเอียดงานตรวจ - HygieGo Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #0f172a; color: white; }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        input, select, textarea {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
        }
        input:focus, select:focus {
            border-color: #00c3aa !important;
            outline: none;
            box-shadow: 0 0 0 2px rgba(0, 195, 170, 0.2);
        }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="bg-[#020617] border-b border-white/5 p-6 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <button onclick="location.href='admin-dashboard.html'" class="flex items-center gap-3 text-gray-400 hover:text-[#00c3aa] transition-all group">
                <i class="fa-solid fa-chevron-left text-sm group-hover:-translate-x-1 transition-transform"></i> 
                <span class="text-base font-black uppercase tracking-widest">Back to Dashboard</span>
            </button>
            <h1 class="font-black tracking-[0.2em] text-[#00c3aa] text-xl md:text-2xl uppercase">Inspection Detail</h1>
            <div class="w-10"></div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 md:p-14">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            
            <div class="lg:col-span-8 space-y-10">
                <section class="glass-card p-10 rounded-[3rem]">
                    <h3 class="text-2xl font-black text-white mb-8 flex items-center gap-4">
                        <div class="w-10 h-10 rounded-xl bg-[#00c3aa]/10 flex items-center justify-center">
                            <i class="fa-solid fa-store text-[#00c3aa] text-lg"></i>
                        </div>
                        ข้อมูลร้านค้าและงานตรวจ
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                        <div>
                            <p class="text-xs text-gray-500 font-black uppercase tracking-widest mb-2">ชื่อร้านอาหาร</p>
                            <p id="detRestaurant" class="text-2xl font-black text-white">กำลังโหลด...</p>
                        </div>
                        <div>
                            <p class="text-xs text-gray-500 font-black uppercase tracking-widest mb-2">สถานะปัจจุบัน</p>
                            <span id="detStatus" class="inline-block px-5 py-2 rounded-xl text-xs font-black uppercase tracking-widest bg-white/5 border border-white/5">-</span>
                        </div>
                        <div class="md:col-span-2 pt-6 border-t border-white/5">
                            <p class="text-xs text-gray-500 font-black uppercase tracking-widest mb-2">ID งานอ้างอิง</p>
                            <p id="detBookingId" class="text-base font-mono text-gray-400">#</p>
                        </div>
                    </div>
                </section>

                <section class="glass-card p-10 rounded-[3rem]">
                    <h3 class="text-2xl font-black text-white mb-8 flex items-center gap-4">
                        <div class="w-10 h-10 rounded-xl bg-[#00c3aa]/10 flex items-center justify-center">
                            <i class="fa-solid fa-images text-[#00c3aa] text-lg"></i>
                        </div>
                        รูปภาพประกอบการประเมิน
                    </h3>
                    <div id="customerImages" class="grid grid-cols-2 md:grid-cols-3 gap-6 min-h-[250px]">
                        </div>
                </section>
            </div>

            <div class="lg:col-span-4 space-y-10">
                <section class="glass-card p-10 rounded-[3rem] sticky top-36 border-[#00c3aa]/10 shadow-2xl shadow-[#00c3aa]/5">
                    <h3 class="text-xl font-black text-white mb-10 border-b border-white/5 pb-5 uppercase tracking-[0.15em] flex items-center gap-3">
                        <i class="fas fa-hammer text-[#00c3aa]"></i> Action Panel
                    </h3>
                    
                    <div class="space-y-8">
                        <div>
                            <label class="text-xs font-black text-gray-400 uppercase tracking-widest block mb-4">สถานะการทำงาน</label>
                            <select id="updateStatus" class="w-full p-5 rounded-2xl text-base md:text-lg font-bold outline-none transition-all">
                                <option value="Pending">Pending (รอดำเนินการ)</option>
                                <option value="In Progress">In Progress (กำลังตรวจ)</option>
                                <option value="Completed">Completed (เสร็จสิ้น)</option>
                            </select>
                        </div>

                        <div class="grid grid-cols-1 gap-6">
                            <div>
                                <label class="text-xs font-black text-gray-400 uppercase tracking-widest block mb-4">Floor Score (0-100)</label>
                                <input type="number" id="floor_score" min="0" max="100" placeholder="ระบุคะแนนพื้น" class="w-full p-5 rounded-2xl text-lg font-black text-center">
                            </div>
                            <div>
                                <label class="text-xs font-black text-gray-400 uppercase tracking-widest block mb-4">Counter Score (0-100)</label>
                                <input type="number" id="counter_score" min="0" max="100" placeholder="ระบุคะแนนเคาน์เตอร์" class="w-full p-5 rounded-2xl text-lg font-black text-center">
                            </div>
                        </div>

                        <div>
                            <label class="text-xs font-black text-gray-400 uppercase tracking-widest block mb-4">ผลการประเมินสรุป</label>
                            <select id="finalResult" class="w-full p-5 rounded-2xl text-base md:text-lg font-bold outline-none">
                                <option value="Pass" class="text-emerald-400 font-bold">Pass (ผ่านเกณฑ์)</option>
                                <option value="Fail" class="text-red-400 font-bold">Fail (ไม่ผ่านเกณฑ์)</option>
                            </select>
                        </div>

                        <button id="btnSaveTask" class="w-full py-6 bg-[#00c3aa] text-[#0f172a] rounded-3xl font-black uppercase tracking-widest text-lg shadow-xl shadow-[#00c3aa]/20 hover:scale-[1.02] active:scale-95 transition-all mt-6">
                            Save Inspection <i class="fas fa-save ml-2"></i>
                        </button>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <script type="module">
        const SUPABASE_URL = 'https://yqlbdwfcnffjuzjznrbi.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_JFvzaU8LuSa8KzL7o7Fmaw_J4oergY7';
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const bookingId = urlParams.get('id');

        async function init() {
            const savedUser = JSON.parse(localStorage.getItem('hygieUser'));
            if (!savedUser || savedUser.role !== 'admin') {
                window.location.href = '../auth/login.html';
                return;
            }
            if (!bookingId) {
                Swal.fire('Error', 'ไม่พบรหัสงานตรวจ', 'error').then(() => location.href = 'admin-dashboard.html');
                return;
            }
            await loadTaskDetail();
        }

        async function loadTaskDetail() {
            try {
                const { data: booking, error } = await client
                    .from('booking')
                    .select('*, users(restaurant_name, user_id), inspection(*)')
                    .eq('booking_id', bookingId)
                    .single();

                if (error) throw error;

                document.getElementById('detRestaurant').innerText = booking.users?.restaurant_name || 'ไม่ทราบชื่อร้าน';
                document.getElementById('detBookingId').innerText = `JOB REF: ${booking.booking_id}`;
                document.getElementById('detStatus').innerText = booking.status;
                document.getElementById('updateStatus').value = booking.status;

                const statusEl = document.getElementById('detStatus');
                statusEl.className = `inline-block px-5 py-2 rounded-xl text-xs font-black uppercase tracking-widest ${
                    booking.status === 'Completed' ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' : 'bg-orange-500/10 text-orange-400 border-orange-500/20'
                }`;

                if (booking.inspection && booking.inspection.length > 0) {
                    const insp = booking.inspection[0];
                    document.getElementById('floor_score').value = insp.floor_score;
                    document.getElementById('counter_score').value = insp.counter_score;
                    document.getElementById('finalResult').value = insp.result;
                }

                if (booking.users?.user_id) loadPhotos(booking.users.user_id);

            } catch (err) {
                console.error(err);
                Swal.fire('Error', 'โหลดข้อมูลไม่สำเร็จ', 'error');
            }
        }

        async function loadPhotos(userId) {
            const { data: files } = await client.storage.from('task-images').list(userId + '/');
            const grid = document.getElementById('customerImages');
            grid.innerHTML = '';
            
            if (files && files.length > 0) {
                files.forEach(f => {
                    if (f.name === '.emptyFolderPlaceholder') return;
                    const { data: url } = client.storage.from('task-images').getPublicUrl(`${userId}/${f.name}`);
                    grid.innerHTML += `
                        <div class="relative group cursor-pointer overflow-hidden rounded-3xl aspect-square bg-white/5 border border-white/5" onclick="window.open('${url.publicUrl}')">
                            <img src="${url.publicUrl}" class="h-full w-full object-cover group-hover:scale-110 transition-transform duration-700">
                            <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-all duration-300">
                                <i class="fa-solid fa-magnifying-glass-plus text-white text-2xl"></i>
                            </div>
                        </div>`;
                });
            } else {
                grid.innerHTML = '<div class="col-span-3 flex flex-col items-center justify-center py-20 opacity-30 border-2 border-dashed border-white/5 rounded-3xl"><i class="fa-solid fa-box-open text-5xl mb-5"></i><p class="text-base font-bold">ไม่มีรูปภาพประกอบจากลูกค้า</p></div>';
            }
        }

        document.getElementById('btnSaveTask').addEventListener('click', async () => {
            const status = document.getElementById('updateStatus').value;
            const fScore = parseInt(document.getElementById('floor_score').value);
            const cScore = parseInt(document.getElementById('counter_score').value);
            const result = document.getElementById('finalResult').value;

            if (status === 'Completed' && (isNaN(fScore) || isNaN(cScore))) {
                return Swal.fire('ข้อมูลไม่ครบ', 'กรุณาระบุคะแนนก่อนเปลี่ยนสถานะเป็น Completed', 'warning');
            }

            Swal.fire({
                title: 'ยืนยันการบันทึกข้อมูล?',
                text: 'การบันทึกจะส่งผลต่อข้อมูลใน Dashboard ของลูกค้าทันที',
                icon: 'question',
                background: '#1e293b',
                color: '#fff',
                showCancelButton: true,
                confirmButtonColor: '#00c3aa',
                confirmButtonText: 'ยืนยันการอัปเดต'
            }).then(async (res) => {
                if (res.isConfirmed) {
                    try {
                        await client.from('booking').update({ status }).eq('booking_id', bookingId);
                        if (status === 'Completed') {
                            await client.from('inspection').upsert([{
                                booking_id: bookingId,
                                floor_score: fScore,
                                counter_score: cScore,
                                total_score: (fScore + cScore) / 2,
                                result: result,
                                inspection_date: new Date().toISOString()
                            }], { onConflict: 'booking_id' });
                        }
                        await Swal.fire({ icon: 'success', title: 'อัปเดตข้อมูลสำเร็จ', background: '#1e293b', color: '#fff', timer: 1500, showConfirmButton: false });
                        location.reload();
                    } catch (err) {
                        Swal.fire('Error', err.message, 'error');
                    }
                }
            });
        });

        init();
    </script>
</body>
</html>
